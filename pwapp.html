<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>比心 - 游戏陪玩语音社交</title>
<style>
  :root {
    --primary: #FF4D6A;
    --primary-light: #FF7A90;
    --primary-dark: #E8365A;
    --primary-glow: rgba(255,77,106,0.25);
    --secondary: #FF8A4C;
    --accent-gold: #FFD25A;
    --accent-purple: #A855F7;
    --accent-blue: #3B82F6;
    --accent-green: #22C55E;
    --bg: #F5F5F8;
    --bg-white: #FFFFFF;
    --bg-card: #FFFFFF;
    --fg: #1A1A2E;
    --fg-secondary: #6B7280;
    --fg-muted: #9CA3AF;
    --border: #F0F0F5;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 30px rgba(0,0,0,0.1);
    --radius: 14px;
    --radius-sm: 10px;
    --radius-xs: 6px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { font-size:16px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ===== 顶部导航栏 ===== */
  .top-nav {
    position: fixed; top:0; left:0; right:0; z-index:100;
    background: var(--bg-white);
    border-bottom: 1px solid var(--border);
    padding-top: env(safe-area-inset-top, 0px);
  }
  .top-nav-inner {
    display: flex; align-items: center; padding: 10px 16px; gap: 10px;
  }
  .nav-location {
    display: flex; align-items: center; gap: 3px;
    font-size: 0.82rem; font-weight: 600; color: var(--fg);
    flex-shrink: 0; cursor: pointer;
  }
  .nav-location svg { width:14px; height:14px; fill:var(--primary); }
  .nav-search {
    flex:1; display:flex; align-items:center; gap:6px;
    background: var(--bg); border-radius: 20px;
    padding: 7px 14px; cursor: pointer;
  }
  .nav-search svg { width:16px; height:16px; stroke:var(--fg-muted); fill:none; }
  .nav-search span { font-size:0.8rem; color:var(--fg-muted); }
  .nav-actions { display:flex; gap:12px; flex-shrink:0; }
  .nav-icon-btn {
    position:relative; width:32px; height:32px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; border-radius:50%;
    transition: background 0.2s;
  }
  .nav-icon-btn:hover { background:var(--bg); }
  .nav-icon-btn svg { width:22px; height:22px; stroke:var(--fg); fill:none; }
  .nav-badge {
    position:absolute; top:2px; right:2px;
    min-width:16px; height:16px; border-radius:8px;
    background:var(--primary); color:#fff;
    font-size:0.58rem; font-weight:700;
    display:flex; align-items:center; justify-content:center;
    padding:0 4px;
  }

  /* ===== 分类标签 ===== */
  .category-bar {
    position: fixed; top: 53px; left:0; right:0; z-index:99;
    background: var(--bg-white);
    border-bottom: 1px solid var(--border);
    padding-top: env(safe-area-inset-top, 0px);
  }
  .category-scroll {
    display:flex; overflow-x:auto; padding:8px 12px; gap:4px;
    scrollbar-width:none;
  }
  .category-scroll::-webkit-scrollbar { display:none; }
  .cat-tab {
    flex-shrink:0; padding:6px 14px;
    border-radius:18px; font-size:0.78rem; font-weight:500;
    color:var(--fg-secondary); background:var(--bg);
    cursor:pointer; transition:all 0.25s;
    border:1.5px solid transparent;
    white-space:nowrap;
  }
  .cat-tab.active {
    background:rgba(255,77,106,0.08); color:var(--primary);
    border-color:var(--primary); font-weight:600;
  }
  .cat-tab:hover:not(.active) { background:#EDEDF2; }

  /* ===== 主内容区 ===== */
  .main-content {
    padding-top: 94px;
    padding-bottom: calc(70px + var(--safe-bottom));
  }

  /* ===== 页面容器 ===== */
  .page { display:none; }
  .page.active { display:block; }

  /* ===== 轮播Banner ===== */
  .banner-wrap { padding:12px 16px 4px; }
  .banner-track {
    display:flex; overflow:hidden; border-radius:var(--radius);
    position:relative; height:130px;
  }
  .banner-slide {
    min-width:100%; height:100%; border-radius:var(--radius);
    display:flex; align-items:center; padding:24px;
    position:relative; overflow:hidden;
    transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
  }
  .banner-slide .banner-bg {
    position:absolute; inset:0;
  }
  .bs-1 .banner-bg { background:linear-gradient(135deg,#FF4D6A,#FF8A4C); }
  .bs-2 .banner-bg { background:linear-gradient(135deg,#A855F7,#6366F1); }
  .bs-3 .banner-bg { background:linear-gradient(135deg,#3B82F6,#06B6D4); }
  .banner-slide .banner-circles {
    position:absolute; right:-20px; top:-20px;
    width:120px; height:120px; border-radius:50%;
    background:rgba(255,255,255,0.12);
  }
  .banner-slide .banner-circles::after {
    content:''; position:absolute; bottom:-30px; left:-20px;
    width:80px; height:80px; border-radius:50%;
    background:rgba(255,255,255,0.08);
  }
  .banner-slide .banner-text { position:relative; z-index:2; color:#fff; }
  .banner-slide .banner-text h3 { font-size:1.15rem; font-weight:800; margin-bottom:4px; }
  .banner-slide .banner-text p { font-size:0.75rem; opacity:0.85; line-height:1.5; }
  .banner-slide .banner-text .banner-btn {
    display:inline-block; margin-top:10px;
    background:rgba(255,255,255,0.2); backdrop-filter:blur(8px);
    color:#fff; border:1px solid rgba(255,255,255,0.3);
    padding:5px 16px; border-radius:14px;
    font-size:0.72rem; font-weight:600; cursor:pointer;
    transition:background 0.2s;
  }
  .banner-slide .banner-text .banner-btn:hover { background:rgba(255,255,255,0.35); }
  .banner-dots {
    display:flex; justify-content:center; gap:5px; margin-top:8px;
  }
  .banner-dots .bdot {
    width:6px; height:6px; border-radius:3px;
    background:var(--fg-muted); opacity:0.3; transition:all 0.3s;
  }
  .banner-dots .bdot.active { width:18px; background:var(--primary); opacity:1; }

  /* ===== 快捷入口 ===== */
  .quick-entry {
    display:flex; padding:14px 8px 6px; gap:0;
  }
  .qe-item {
    flex:1; display:flex; flex-direction:column;
    align-items:center; gap:6px; cursor:pointer;
  }
  .qe-icon {
    width:48px; height:48px; border-radius:14px;
    display:flex; align-items:center; justify-content:center;
    font-size:1.4rem; position:relative;
    transition: transform 0.2s;
  }
  .qe-item:active .qe-icon { transform:scale(0.92); }
  .qe-icon svg { width:24px; height:24px; }
  .qe-item span { font-size:0.7rem; color:var(--fg-secondary); font-weight:500; }
  .qe-hot {
    position:absolute; top:-3px; right:-6px;
    background:var(--primary); color:#fff;
    font-size:0.5rem; font-weight:700;
    padding:1px 4px; border-radius:4px; line-height:1.3;
  }

  /* ===== 区块标题 ===== */
  .section-title {
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 16px 10px;
  }
  .section-title h3 {
    font-size:1rem; font-weight:700; display:flex; align-items:center; gap:6px;
  }
  .section-title h3 .st-icon {
    width:4px; height:16px; border-radius:2px;
    background:linear-gradient(180deg,var(--primary),var(--secondary));
  }
  .section-title .st-more {
    font-size:0.75rem; color:var(--fg-muted); cursor:pointer;
    display:flex; align-items:center; gap:2px;
  }
  .section-title .st-more svg { width:14px; height:14px; stroke:var(--fg-muted); fill:none; }

  /* ===== 在线大神横向滚动 ===== */
  .god-scroll-wrap { padding:0 0 4px; }
  .god-scroll {
    display:flex; overflow-x:auto; padding:0 12px 8px; gap:12px;
    scrollbar-width:none;
  }
  .god-scroll::-webkit-scrollbar { display:none; }
  .god-card {
    flex-shrink:0; width:110px; cursor:pointer;
    transition: transform 0.2s;
  }
  .god-card:active { transform:scale(0.96); }
  .god-avatar-wrap {
    position:relative; width:110px; height:110px;
    border-radius:var(--radius); overflow:visible;
  }
  .god-avatar {
    width:100%; height:100%; border-radius:var(--radius);
    object-fit:cover; display:block;
    background:linear-gradient(135deg,#FFE4E8,#FFF0E5);
  }
  .god-online {
    position:absolute; bottom:6px; right:6px;
    width:10px; height:10px; border-radius:50%;
    background:var(--accent-green); border:2px solid #fff;
  }
  .god-online.offline { background:var(--fg-muted); }
  .god-ranking {
    position:absolute; top:-2px; left:-2px;
    background:linear-gradient(135deg,#FFD25A,#FF8A4C);
    color:#fff; font-size:0.55rem; font-weight:800;
    padding:2px 6px; border-radius:0 0 8px 0;
    box-shadow:0 2px 6px rgba(255,210,90,0.4);
  }
  .god-info { padding:6px 2px 0; }
  .god-name {
    font-size:0.78rem; font-weight:600;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .god-tags { display:flex; gap:3px; margin-top:3px; flex-wrap:wrap; }
  .god-tag {
    font-size:0.58rem; padding:1px 5px; border-radius:3px;
    font-weight:500;
  }
  .gt-game { background:rgba(255,77,106,0.1); color:var(--primary); }
  .gt-voice { background:rgba(168,85,247,0.1); color:var(--accent-purple); }
  .gt-price { background:rgba(255,138,76,0.1); color:var(--secondary); }

  /* ===== 陪玩师列表 ===== */
  .player-list { padding:0 16px; }
  .player-card {
    display:flex; gap:12px; padding:14px 0;
    border-bottom:1px solid var(--border);
    cursor:pointer; transition:background 0.15s;
    position:relative;
  }
  .player-card:last-child { border-bottom:none; }
  .player-card:active { background:rgba(0,0,0,0.01); }
  .pc-avatar-wrap { position:relative; flex-shrink:0; }
  .pc-avatar {
    width:56px; height:56px; border-radius:16px;
    object-fit:cover; display:block;
    background:linear-gradient(135deg,#FFE4E8,#FFF0E5);
  }
  .pc-online {
    position:absolute; bottom:1px; right:1px;
    width:10px; height:10px; border-radius:50%;
    background:var(--accent-green); border:2px solid #fff;
  }
  .pc-info { flex:1; min-width:0; }
  .pc-name-row {
    display:flex; align-items:center; gap:6px;
  }
  .pc-name { font-size:0.88rem; font-weight:600; }
  .pc-gender {
    width:16px; height:16px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:0.6rem;
  }
  .pc-gender.female { background:rgba(255,77,106,0.12); color:var(--primary); }
  .pc-gender.male { background:rgba(59,130,246,0.12); color:var(--accent-blue); }
  .pc-level {
    font-size:0.55rem; font-weight:700; padding:1px 5px;
    border-radius:4px; background:linear-gradient(135deg,#FFD25A,#FF8A4C);
    color:#fff;
  }
  .pc-desc {
    font-size:0.74rem; color:var(--fg-secondary); margin-top:3px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .pc-tags { display:flex; gap:4px; margin-top:6px; flex-wrap:wrap; }
  .pc-tag {
    font-size:0.62rem; padding:2px 7px; border-radius:4px;
    background:var(--bg); color:var(--fg-secondary); font-weight:500;
  }
  .pc-tag.hot { background:rgba(255,77,106,0.08); color:var(--primary); }
  .pc-right {
    display:flex; flex-direction:column; align-items:flex-end;
    justify-content:space-between; flex-shrink:0;
  }
  .pc-price {
    font-size:0.85rem; font-weight:700; color:var(--primary);
  }
  .pc-price em { font-style:normal; font-size:0.65rem; font-weight:400; color:var(--fg-muted); }
  .pc-order-btn {
    background:linear-gradient(135deg,var(--primary),var(--primary-light));
    color:#fff; border:none; border-radius:14px;
    padding:5px 14px; font-size:0.72rem; font-weight:600;
    cursor:pointer; transition:transform 0.15s, box-shadow 0.15s;
    box-shadow:0 3px 10px var(--primary-glow);
  }
  .pc-order-btn:active { transform:scale(0.94); }

  /* ===== 派对页面 ===== */
  .party-header {
    padding:16px; display:flex; align-items:center; justify-content:space-between;
  }
  .party-header h2 { font-size:1.2rem; font-weight:800; }
  .party-header .ph-filter {
    display:flex; align-items:center; gap:4px;
    font-size:0.78rem; color:var(--fg-secondary); cursor:pointer;
  }
  .party-header .ph-filter svg { width:16px; height:16px; stroke:var(--fg-secondary); fill:none; }
  .party-categories {
    display:flex; padding:0 16px 12px; gap:8px; overflow-x:auto;
    scrollbar-width:none;
  }
  .party-categories::-webkit-scrollbar { display:none; }
  .party-cat {
    flex-shrink:0; padding:8px 16px; border-radius:20px;
    background:var(--bg-white); border:1.5px solid var(--border);
    font-size:0.78rem; font-weight:500; color:var(--fg-secondary);
    cursor:pointer; transition:all 0.2s; white-space:nowrap;
  }
  .party-cat.active {
    background:rgba(255,77,106,0.08); border-color:var(--primary);
    color:var(--primary); font-weight:600;
  }
  .room-list { padding:0 16px; }
  .room-card {
    background:var(--bg-white); border-radius:var(--radius);
    padding:14px; margin-bottom:10px;
    box-shadow:var(--shadow); cursor:pointer;
    transition:transform 0.2s, box-shadow 0.2s;
    position:relative; overflow:hidden;
  }
  .room-card:active { transform:scale(0.98); }
  .room-card .rc-header {
    display:flex; align-items:center; gap:10px; margin-bottom:10px;
  }
  .rc-cover {
    width:44px; height:44px; border-radius:12px;
    object-fit:cover; background:linear-gradient(135deg,#FFE4E8,#E8D5FF);
  }
  .rc-info { flex:1; }
  .rc-name { font-size:0.88rem; font-weight:600; }
  .rc-host { font-size:0.7rem; color:var(--fg-muted); margin-top:1px; }
  .rc-live {
    display:flex; align-items:center; gap:4px;
    background:rgba(255,77,106,0.08); color:var(--primary);
    padding:3px 8px; border-radius:10px;
    font-size:0.65rem; font-weight:600;
  }
  .rc-live .live-dot {
    width:6px; height:6px; border-radius:50%;
    background:var(--primary); animation:livePulse 1.5s infinite;
  }
  @keyframes livePulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  .rc-avatars {
    display:flex; align-items:center;
  }
  .rc-avatars img {
    width:28px; height:28px; border-radius:50%;
    border:2px solid #fff; margin-left:-8px;
    object-fit:cover; background:#eee;
  }
  .rc-avatars img:first-child { margin-left:0; }
  .rc-avatars .rc-more {
    width:28px; height:28px; border-radius:50%;
    background:var(--bg); border:2px solid #fff;
    margin-left:-8px; display:flex; align-items:center; justify-content:center;
    font-size:0.55rem; color:var(--fg-muted); font-weight:600;
  }
  .rc-bottom {
    display:flex; align-items:center; justify-content:space-between;
  }
  .rc-tags { display:flex; gap:4px; }
  .rc-tag {
    font-size:0.62rem; padding:2px 7px; border-radius:4px;
    background:var(--bg); color:var(--fg-secondary);
  }
  .rc-join {
    background:linear-gradient(135deg,var(--primary),var(--primary-light));
    color:#fff; border:none; border-radius:14px;
    padding:5px 16px; font-size:0.72rem; font-weight:600;
    cursor:pointer; box-shadow:0 3px 10px var(--primary-glow);
  }
  .rc-join:active { transform:scale(0.94); }
  .rc-wave {
    position:absolute; bottom:-20px; right:-20px;
    width:80px; height:80px; border-radius:50%;
    opacity:0.04; pointer-events:none;
  }

  /* ===== 消息页面 ===== */
  .msg-header {
    padding:16px; display:flex; align-items:center; justify-content:space-between;
  }
  .msg-header h2 { font-size:1.2rem; font-weight:800; }
  .msg-tabs {
    display:flex; padding:0 16px 12px; gap:0;
    background:var(--bg-white); border-radius:10px;
    margin:0 16px; overflow:hidden;
  }
  .msg-tab {
    flex:1; text-align:center; padding:8px 0;
    font-size:0.8rem; font-weight:500; color:var(--fg-secondary);
    cursor:pointer; transition:all 0.2s; position:relative;
  }
  .msg-tab.active {
    color:var(--primary); font-weight:700;
  }
  .msg-tab.active::after {
    content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%);
    width:20px; height:3px; border-radius:2px; background:var(--primary);
  }
  .msg-list { padding:8px 16px 0; }
  .msg-item {
    display:flex; align-items:center; gap:12px;
    padding:12px 0; border-bottom:1px solid var(--border);
    cursor:pointer;
  }
  .msg-item:last-child { border-bottom:none; }
  .msg-avatar {
    width:50px; height:50px; border-radius:50%;
    object-fit:cover; flex-shrink:0;
    background:linear-gradient(135deg,#FFE4E8,#FFF0E5);
    position:relative;
  }
  .msg-avatar .msg-unread {
    position:absolute; top:-2px; right:-2px;
    min-width:18px; height:18px; border-radius:9px;
    background:var(--primary); color:#fff;
    font-size:0.6rem; font-weight:700;
    display:flex; align-items:center; justify-content:center;
    padding:0 4px; border:2px solid var(--bg);
  }
  .msg-content { flex:1; min-width:0; }
  .msg-name { font-size:0.88rem; font-weight:600; }
  .msg-preview {
    font-size:0.74rem; color:var(--fg-muted); margin-top:2px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .msg-time { font-size:0.65rem; color:var(--fg-muted); flex-shrink:0; }

  /* ===== 我的页面 ===== */
  .profile-header {
    background:linear-gradient(135deg,var(--primary),var(--primary-light));
    padding:24px 16px 30px; color:#fff;
    position:relative; overflow:hidden;
  }
  .profile-header .ph-decor1 {
    position:absolute; top:-30px; right:-20px;
    width:120px; height:120px; border-radius:50%;
    background:rgba(255,255,255,0.08);
  }
  .profile-header .ph-decor2 {
    position:absolute; bottom:-40px; left:-20px;
    width:100px; height:100px; border-radius:50%;
    background:rgba(255,255,255,0.06);
  }
  .profile-info {
    display:flex; align-items:center; gap:14px;
    position:relative; z-index:2;
  }
  .profile-avatar {
    width:64px; height:64px; border-radius:50%;
    border:3px solid rgba(255,255,255,0.4);
    object-fit:cover; background:#FFE4E8;
  }
  .profile-detail { flex:1; }
  .profile-name { font-size:1.1rem; font-weight:700; }
  .profile-id { font-size:0.72rem; opacity:0.8; margin-top:2px; }
  .profile-edit {
    background:rgba(255,255,255,0.2); border:1px solid rgba(255,255,255,0.3);
    color:#fff; border-radius:16px; padding:5px 14px;
    font-size:0.72rem; cursor:pointer; font-weight:500;
  }
  .profile-stats {
    display:flex; margin-top:20px; position:relative; z-index:2;
  }
  .ps-item { flex:1; text-align:center; }
  .ps-num { font-size:1.15rem; font-weight:800; }
  .ps-label { font-size:0.68rem; opacity:0.8; margin-top:1px; }

  .profile-wallet {
    display:flex; margin:-18px 16px 0; background:var(--bg-white);
    border-radius:var(--radius); padding:16px;
    box-shadow:var(--shadow-lg); position:relative; z-index:3;
  }
  .pw-item {
    flex:1; text-align:center;
    position:relative;
  }
  .pw-item + .pw-item::before {
    content:''; position:absolute; left:0; top:15%; height:70%;
    width:1px; background:var(--border);
  }
  .pw-num { font-size:1.1rem; font-weight:700; color:var(--primary); }
  .pw-label { font-size:0.68rem; color:var(--fg-muted); margin-top:2px; }

  .profile-menu { padding:16px; }
  .pm-group {
    background:var(--bg-white); border-radius:var(--radius);
    margin-bottom:10px; overflow:hidden;
    box-shadow:var(--shadow);
  }
  .pm-item {
    display:flex; align-items:center; gap:12px;
    padding:14px 16px; cursor:pointer;
    transition:background 0.15s;
  }
  .pm-item:active { background:rgba(0,0,0,0.02); }
  .pm-item + .pm-item { border-top:1px solid var(--border); }
  .pm-icon {
    width:36px; height:36px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:1.1rem;
  }

/* ========== 交互逻辑 ========== */

// Toast
var toastTimer = null;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 2000);
}

// Tab切换
var currentTab = 0;
function switchTab(idx) {
  currentTab = idx;
  var pages = ['pageHome','pageParty','pageMsg','pageMe'];
  var showCatBar = idx === 0;
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById(pages[idx]).classList.add('active');
  document.getElementById('catBar').style.display = showCatBar ? '' : 'none';
  document.getElementById('topNav').style.display = idx === 3 ? 'none' : '';
  document.querySelectorAll('.tab-item,.tab-center').forEach(function(t){ t.classList.remove('active'); });
  var tabItems = document.querySelectorAll('.bottom-tab .tab-item');
  if (idx < 2 && tabItems[idx]) tabItems[idx].classList.add('active');
  if (idx >= 2 && tabItems[idx+1]) tabItems[idx+1].classList.add('active');

  // 调整内容区padding
  var mainContent = document.querySelector('.main-content');
  if (idx === 0) {
    mainContent.style.paddingTop = '94px';
  } else {
    mainContent.style.paddingTop = '53px';
  }
  window.scrollTo(0, 0);
}

// 分类选择
function selectCat(el, name) {
  document.querySelectorAll('.cat-tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  showToast('切换到: ' + name);
}

// 派对分类选择
function selectPartyCat(el) {
  document.querySelectorAll('.party-cat').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
}

// 消息Tab选择
function selectMsgTab(el) {
  document.querySelectorAll('.msg-tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
}

    photoHtml += '<img class="ds-photo" src="https://picsum.photos/seed/'+p.name+'photo'+i+'/200/260.jpg" alt="">';
  }

  var giftHtml = '';
  gifts.forEach(function(g) {
    giftHtml += '<div class="ds-gift" onclick="showToast(\'送出 '+g.name+'\')">' +
      '<div class="ds-gift-icon" style="background:'+g.bg+'">'+g.emoji+'</div>' +
      '<div class="ds-gift-name">'+g.name+'</div>' +
      '<div class="ds-gift-price">'+g.price+'币</div></div>';
  });

  var html = '<div class="ds-handle"></div>' +
    '<div class="ds-profile">' +
    '<img class="ds-avatar" src="https://picsum.photos/seed/'+p.name+'/160/160.jpg" alt="'+p.name+'">' +
    '<div class="ds-name">'+p.name+' <span class="pc-gender '+p.gender+'" style="display:inline-flex;width:18px;height:18px;font-size:0.65rem;">'+(p.gender==='female'?'♀':'♂')+'</span> <span class="pc-level">Lv.'+p.level+'</span></div>' +
    '<div class="ds-desc">'+p.desc+'</div>' +
    '<div class="ds-stats">' +
    '<div class="ds-stat"><div class="ds-stat-num">'+p.score+'</div><div class="ds-stat-label">评分</div></div>' +
    '<div class="ds-stat"><div class="ds-stat-num">'+(p.orders>=1000?(p.orders/1000).toFixed(1)+'k':p.orders)+'</div><div class="ds-stat-label">接单</div></div>' +
    '<div class="ds-stat"><div class="ds-stat-num">'+p.fans+'w</div><div class="ds-stat-label">粉丝</div></div></div></div>' +
    '<div class="ds-photos">'+photoHtml+'</div>' +
    '<div class="ds-actions">' +
    '<button class="ds-btn ds-btn-chat" onclick="showToast(\'发送私信\');closeDetail();'>私信</button>' +
    '<button class="ds-btn ds-btn-order" onclick="startCall(\''+p.name+'\');closeDetail();">立即下单 ¥'+p.price+'/'+p.unit+'</button></div>' +
    '<div class="ds-gifts"><h4>送礼物</h4><div class="ds-gift-list">'+giftHtml+'</div></div>';

  document.getElementById('detailSheet').innerHTML = html;
  document.getElementById('detailOverlay').classList.add('show');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('show');
}
document.getElementById('detailOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeDetail();
});

// 呼叫功能
var callTimer = null;
function startCall(name) {
  var p = players.find(function(pl){ return pl.name === name; });
  if (!p) return;

  document.getElementById('callAvatar').src = 'https://picsum.photos/seed/'+p.name+'/200/200.jpg';
  document.getElementById('callName').textContent = p.name;

  var statusEl = document.getElementById('callStatus');
  statusEl.textContent = '正在呼叫...';

  // 渲染音波
  var wavesHtml = '';
  for (var i = 0; i < 20; i++) {
    wavesHtml += '<div class="call-wave-bar" style="animation-delay:'+(i*0.08)+'s"></div>';
  }
  document.getElementById('callWaves').innerHTML = wavesHtml;

  document.getElementById('callOverlay').classList.add('show');

  // 模拟接通
  clearTimeout(callTimer);
  callTimer = setTimeout(function() {
    statusEl.textContent = '已接通 00:03';
    var sec = 3;
    setInterval(function() {
      sec++;
      var m = Math.floor(sec/60);
      var s = sec%60;
      statusEl.textContent = '已接通 ' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    }, 1000);
  }, 2500);
}

function endCall() {
  document.getElementById('callOverlay').classList.remove('show');
  clearTimeout(callTimer);
  showToast('通话已结束');
}

// 发布/接单
function showPublish() {
  showToast('接单中心 - 成为陪玩师');
}

// 轮播自动播放
var bannerIdx = 0;
function rotateBanner() {
  bannerIdx = (bannerIdx + 1) % 3;
  var track = document.getElementById('bannerTrack');
  if (track) {
    track.style.transform = 'translateX(-' + (bannerIdx * 100) + '%)';
  }
  var dots = document.querySelectorAll('.bdot');
  dots.forEach(function(d, i) {
    d.classList.toggle('active', i === bannerIdx);
  });
}
setInterval(rotateBanner, 3500);

// 浮动爱心
function createFloatingHearts() {
  var container = document.getElementById('floatHearts');
  var hearts = ['♥','♡','❤','💕'];
  for (var i = 0; i < 8; i++) {
    var h = document.createElement('div');
    h.className = 'fh';
    h.textContent = hearts[Math.floor(Math.random()*hearts.length)];
    h.style.left = Math.random()*100 + '%';
    h.style.animationDelay = Math.random()*6 + 's';
    h.style.animationDuration = (5+Math.random()*4) + 's';
    h.style.fontSize = (0.8+Math.random()*1) + 'rem';
    h.style.color = 'rgba(255,77,106,' + (0.08+Math.random()*0.06) + ')';
    container.appendChild(h);
  }
}
